<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic: The Musical Fan Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EPIC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="video.html">Video</a></li>
                    <li class="nav-item"><a class="nav-link" href="act2.html">Act II</a></li>
                    <li class="nav-item">
                        <button 
                        id="modeToggle" 
                        type="button"
                        class="btn btn-outline-light ms-lg-3"
                        >
                        🌙 Mode</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="landing d-flex align-items-center justify-content-center">
        <div class="text-center text-white">
            <a href="video.html" class="btn btn-danger btn-lg px-5 py-3">ENTER THE SAGA</a>
        </div>
    </header>

    <section class="container my-5 py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 border p-4 rounded shadow">
                <h3 class="text-center mb-4">Join Odysseus's Crew</h3>
                <form id="crewForm">
                    <div class="mb-3">
                        <label for="userName" class="form-label">Warrior Name</label>
                        <input type="text" class="form-control" id="userName" required>
                    </div>
                    <div class="mb-3">
                        <label for="userRole" class="form-label">Role (Archer, Navigator, etc.)</label>
                        <input type="text" class="form-control" id="userRole" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Enlist Now</button>
                </form>
                <div id="formFeedback" class="mt-3 text-center fw-bold"></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
