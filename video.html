<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic: The Musical - Video</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EPIC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="video.html">Video</a></li>
                    <li class="nav-item"><a class="nav-link" href="act2.html">Act II</a></li>
                    <li class="nav-item">
                        <button id="modeToggle" class="btn btn-outline-light ms-lg-3">🌙 Mode</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="video-page container-fluid py-5">
    <div class="container">
        <div class="row">
            
            <div class="col-lg-4 mb-4">
                <h2 class="fw-bold">The Full Saga</h2>
                <p>Epic is a loose musical adaptation of Homer's The Odyssey[cite: 49]. Watch the conceptual album stream below.</p>
                
                <div class="mt-4">
                    <label for="charSearch" class="form-label fw-bold">Find a Character:</label>
                    <input type="text" id="charSearch" class="form-control" placeholder="Search (e.g. Athena)...">
                </div>
            </div>

            <div class="col-lg-5 mb-4">
                <div class="ratio ratio-16x9 shadow-lg rounded">
                    <iframe src="https://www.youtube.com/embed/S2O20SAn_E0" title="Epic Musical" allowfullscreen></iframe>
                </div>
            </div>

            <div class="col-lg-3">
                <h3 class="mb-3">Characters</h3>
                <div class="flip-card mb-3" data-name="odysseus">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <img src="characters/Odysseus2.jpg" alt="Odysseus" class="img-fluid rounded">
                            <p class="mt-2 fw-bold">Odysseus</p>
                        </div>
                        <div class="flip-card-back p-2">
                            <h6>The King</h6>
                            <p class="small">Searching for his way home to Ithaca.</p>
                        </div>
                    </div>
                </div>

                <div class="flip-card" data-name="athena">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <img src="characters/Athena.PNG" alt="Athena" class="img-fluid rounded">
                            <p class="mt-2 fw-bold">Athena</p>
                        </div>
                        <div class="flip-card-back p-2">
                            <h6>Goddess</h6>
                            <p class="small">The mentor and warrior of the mind.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div> </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
